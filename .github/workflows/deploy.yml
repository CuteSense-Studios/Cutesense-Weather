name: Build and Deploy Cutesense Weather

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6 # Updated from v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v6 # Updated from v4
        with:
          node-version: 24 # Updated to Node 24 for the runner
          cache: 'npm'

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
